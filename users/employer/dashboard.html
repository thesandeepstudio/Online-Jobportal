<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Employer Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: { primary: "#407bff", "primary-hover": "#2563eb" },
          },
        },
      };
    </script>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
  </head>
  <body class="bg-gray-50 font-sans">
    <nav class="bg-white shadow-sm sticky top-0 z-50">
      <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="flex justify-between h-16">
          <div class="flex items-center">
            <h1 class="text-2xl font-bold text-primary">Employer Panel</h1>
            <div class="hidden md:flex ml-10 space-x-8">
              <a href="dashboard.html" class="text-gray-900 border-b-2 border-primary px-1 pt-1 text-sm font-medium">Dashboard</a>
              <a href="post_job.html" class="text-gray-500 hover:text-gray-700 px-1 pt-1 text-sm font-medium">Post a Job</a>
              <a href="applications.html" class="text-gray-500 hover:text-gray-700 px-1 pt-1 text-sm font-medium">Applications</a>
            </div>
          </div>
          <div class="flex items-center gap-4">
            <button id="logoutBtn" class="hidden md:block px-4 py-2 text-sm font-medium text-red-500 hover:text-red-700">Logout</button>
            
            <button id="mobileMenuBtn" class="md:hidden text-gray-500 hover:text-gray-700 focus:outline-none">
              <i class="fas fa-bars text-2xl"></i>
            </button>
          </div>
        </div>
      </div>

      <div id="mobileMenu" class="hidden md:hidden bg-white border-t border-gray-100 shadow-lg">
        <div class="px-4 pt-2 pb-4 space-y-1">
          <a href="dashboard.html" class="block px-3 py-2 rounded-md text-base font-medium text-primary bg-blue-50">Dashboard</a>
          <a href="post_job.html" class="block px-3 py-2 rounded-md text-base font-medium text-gray-500 hover:bg-gray-50 hover:text-primary">Post a Job</a>
          <a href="applications.html" class="block px-3 py-2 rounded-md text-base font-medium text-gray-500 hover:bg-gray-50 hover:text-primary">Applications</a>
          <div class="border-t border-gray-100 my-2"></div>
          <button id="logoutBtnMobile" class="w-full text-left px-3 py-2 rounded-md text-base font-medium text-red-500 hover:bg-red-50">Logout</button>
        </div>
      </div>
    </nav>

    <div class="max-w-7xl mx-auto py-10 px-4 sm:px-6 lg:px-8">
      <div class="md:flex md:items-center md:justify-between mb-8">
        <div class="flex-1 min-w-0">
          <h2 class="text-2xl font-bold leading-7 text-gray-900 sm:text-3xl sm:truncate">Welcome Back!</h2>
          <p class="mt-1 text-sm text-gray-500">Manage your job postings and applicants.</p>
        </div>
        <div class="mt-4 flex md:mt-0 md:ml-4">
          <a href="post_job.html" class="w-full md:w-auto inline-flex justify-center items-center px-4 py-2 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-primary hover:bg-primary-hover transition">
            <i class="fas fa-plus mr-2"></i> Post New Job
          </a>
        </div>
      </div>

      <div class="grid grid-cols-1 gap-5 sm:grid-cols-2 lg:grid-cols-3 mb-8">
        <div class="bg-white shadow rounded-lg border border-gray-100 p-6 flex items-center">
          <div class="p-3 rounded-full bg-blue-50 text-primary mr-4"><i class="fas fa-briefcase text-2xl"></i></div>
          <div>
            <dt class="text-xs font-bold text-gray-400 uppercase tracking-wider">Total Jobs Posted</dt>
            <dd class="text-3xl font-semibold text-gray-900" id="totalJobs">0</dd>
          </div>
        </div>

        <div class="bg-white shadow rounded-lg border border-gray-100 p-6 flex items-center">
          <div class="p-3 rounded-full bg-purple-50 text-purple-600 mr-4"><i class="fas fa-users text-2xl"></i></div>
          <div>
            <dt class="text-xs font-bold text-gray-400 uppercase tracking-wider">Total Applications</dt>
            <dd class="text-3xl font-semibold text-gray-900" id="totalApplicants">0</dd>
          </div>
        </div>
      </div>

      <div class="bg-white shadow overflow-hidden sm:rounded-lg border border-gray-100">
        <div class="px-6 py-5 border-b border-gray-200">
          <h3 class="text-lg font-bold text-gray-800">Your Job Postings</h3>
        </div>
        <div class="overflow-x-auto">
          <table class="min-w-full divide-y divide-gray-200">
            <thead class="bg-gray-50">
              <tr>
                <th class="px-6 py-3 text-left text-xs font-bold text-gray-400 uppercase">Job Details</th>
                <th class="px-6 py-3 text-left text-xs font-bold text-gray-400 uppercase hidden sm:table-cell">Type</th>
                <th class="px-6 py-3 text-left text-xs font-bold text-gray-400 uppercase">Status</th>
                <th class="px-6 py-3 text-right text-xs font-bold text-gray-400 uppercase">Action</th>
              </tr>
            </thead>
            <tbody id="jobsTableBody" class="bg-white divide-y divide-gray-200">
              <tr>
                <td colspan="4" class="px-6 py-10 text-center text-gray-400">
                  <i class="fas fa-spinner fa-spin mr-2"></i> Loading jobs...
                </td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>

    <div id="toast" class="fixed bottom-5 right-5 transform translate-y-20 opacity-0 transition-all duration-300 z-[100] bg-gray-900 text-white px-6 py-3 rounded-xl shadow-2xl flex items-center gap-3">
        <i id="toast-icon" class="fas fa-check-circle"></i>
        <span id="toast-msg">Action Successful</span>
    </div>

    <script>
      document.addEventListener("DOMContentLoaded", async () => {
        // Mobile Menu Toggle
        const mobileMenuBtn = document.getElementById('mobileMenuBtn');
        const mobileMenu = document.getElementById('mobileMenu');
        mobileMenuBtn.onclick = () => mobileMenu.classList.toggle('hidden');

        // Logout Logic
        const logoutHandler = async () => {
          if (confirm("Logout?")) {
            await fetch("../../api/logout.php");
            window.location.href = "../../auth/login.html";
          }
        };
        document.getElementById("logoutBtn").onclick = logoutHandler;
        document.getElementById("logoutBtnMobile").onclick = logoutHandler;

        loadJobs();
      });

      async function loadJobs() {
        try {
          const res = await fetch("../../api/jobs/list_employer.php");
          const data = await res.json();
          const tbody = document.getElementById("jobsTableBody");
          tbody.innerHTML = "";

          if (data.status) {
            document.getElementById("totalJobs").innerText = data.data.length;
            document.getElementById("totalApplicants").innerText = data.total_applicants || 0;

            if (data.data.length > 0) {
              data.data.forEach((job) => {
                let statusBadge = "";
                const baseClass = "px-2 py-1 text-[10px] font-bold rounded-full border uppercase tracking-tighter";
                if (job.status === "active") {
                  statusBadge = `<span class="${baseClass} bg-green-50 text-green-700 border-green-200">Active</span>`;
                } else if (job.status === "closed") {
                  statusBadge = `<span class="${baseClass} bg-blue-50 text-blue-700 border-blue-200">Completed</span>`;
                } else if (job.status === "rejected") {
                  statusBadge = `<span class="${baseClass} bg-red-50 text-red-700 border-red-200">Rejected</span>`;
                } else {
                  statusBadge = `<span class="${baseClass} bg-yellow-50 text-yellow-700 border-yellow-200">Pending</span>`;
                }

                tbody.innerHTML += `
                  <tr class="hover:bg-blue-50/30 transition">
                    <td class="px-6 py-4">
                      <div class="text-sm font-bold text-gray-800">${job.title}</div>
                      <div class="text-[10px] text-gray-400 uppercase font-medium mt-0.5">${job.category} • ${new Date(job.created_at).toLocaleDateString()}</div>
                    </td>
                    <td class="px-6 py-4 hidden sm:table-cell">
                      <span class="px-2 py-1 text-[10px] font-bold bg-gray-100 text-gray-600 rounded uppercase">${job.job_type}</span>
                    </td>
                    <td class="px-6 py-4">${statusBadge}</td>
                    <td class="px-6 py-4 text-right">
                      <button onclick="deleteJob(${job.id})" class="text-red-400 hover:text-red-600 transition p-2 bg-red-50 rounded-full hover:bg-red-100" title="Delete Job">
                        <i class="fas fa-trash-alt"></i>
                      </button>
                    </td>
                  </tr>
                `;
              });
            } else {
              tbody.innerHTML = `<tr><td colspan="4" class="px-6 py-10 text-center text-gray-500">No jobs posted yet. <a href="post_job.html" class="text-primary font-bold hover:underline">Post one now!</a></td></tr>`;
            }
          }
        } catch (err) {
          console.error(err);
        }
      }

      async function deleteJob(id) {
        if (!confirm("Are you sure you want to delete this job?")) return;

        try {
          const res = await fetch("../../api/jobs/delete.php", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ job_id: id }),
          });
          const result = await res.json();

          if (result.status) {
            showToast("Job deleted successfully");
            loadJobs();
          } else {
            showToast(result.message, true);
          }
        } catch (err) {
          showToast("Server Error", true);
        }
      }

      function showToast(msg, isError = false) {
          const toast = document.getElementById("toast");
          const icon = document.getElementById("toast-icon");
          document.getElementById("toast-msg").innerText = msg;
          toast.className = `fixed bottom-5 right-5 transition-all duration-300 z-[100] px-6 py-3 rounded-xl shadow-2xl flex items-center gap-3 ${isError ? 'bg-red-600' : 'bg-gray-900'} text-white opacity-100 translate-y-0`;
          icon.className = isError ? "fas fa-exclamation-circle" : "fas fa-check-circle";
          setTimeout(() => { toast.classList.add("opacity-0", "translate-y-20"); }, 3000);
      }
    </script>
  </body>
</html>
