<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Secure Reset</title>
    <link rel="stylesheet" href="../style.css" />
    <link rel="stylesheet" href="reset_password.css" />
  </head>
  <body class="reset-page-body">
    <div class="reset-container">
      <div class="reset-header">
        <h2 class="reset-title">Forgot Password?</h2>
        <p class="reset-subtitle">
          We will send an OTP to your email.
        </p>
      </div>

      <form id="step1-form" class="reset-form">
        <div class="form-group">
          <label for="email" class="form-label">Email Address</label>
          <input
            type="email"
            id="email"
            required
            placeholder="Enter registered email"
            class="form-input"
          />
        </div>
        <button
          type="submit"
          id="btn-send"
          class="btn btn-primary w-full py-large"
        >
          Send OTP
        </button>
      </form>

      <form id="step2-form" class="reset-form hidden">
        <div class="otp-alert">
          OTP sent to <span id="display-email" class="bold-email"></span>.<br />
          <span class="otp-hint"
            >(Check <b>otp_log.txt</b> in project folder)</span
          >
        </div>

        <div class="form-group">
          <label for="otp" class="form-label">Enter OTP Code</label>
          <input
            type="text"
            id="otp"
            required
            placeholder="6-digit code"
            maxlength="6"
            class="form-input otp-input"
          />
        </div>

        <div class="form-group">
          <label for="new_pass" class="form-label">New Password</label>
          <input
            type="password"
            id="new_pass"
            required
            placeholder="New password"
            class="form-input"
          />
        </div>

        <button
          type="submit"
          id="btn-reset"
          class="btn btn-success w-full py-large"
        >
          Reset Password
        </button>
      </form>

      <div class="reset-footer">
        <a href="login.html" class="back-link">Back to Login</a>
      </div>
    </div>

    <script>
      /* JS Logic remains exactly the same as provided in your original snippet */
      let userEmail = "";
      document.getElementById("step1-form").addEventListener("submit", async (e) => {
          e.preventDefault();
          userEmail = document.getElementById("email").value;
          const btn = document.getElementById("btn-send");
          btn.innerText = "Sending...";
          btn.disabled = true;
          try {
            const res = await fetch("../api/send_otp.php", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ email: userEmail }),
            });
            const result = await res.json();
            alert(result.message);
            if (result.status || result.message.includes("sent")) {
              document.getElementById("step1-form").classList.add("hidden");
              document.getElementById("step2-form").classList.remove("hidden");
              document.getElementById("display-email").innerText = userEmail;
            } else {
              btn.innerText = "Send OTP";
              btn.disabled = false;
            }
          } catch (err) {
            console.error(err);
            alert("Server Error");
            btn.innerText = "Send OTP";
            btn.disabled = false;
          }
      });

      document.getElementById("step2-form").addEventListener("submit", async (e) => {
          e.preventDefault();
          const otp = document.getElementById("otp").value;
          const pass = document.getElementById("new_pass").value;
          const btn = document.getElementById("btn-reset");
          btn.innerText = "Verifying...";
          btn.disabled = true;
          try {
            const res = await fetch("../api/verify_reset.php", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({
                email: userEmail,
                otp: otp,
                new_password: pass,
              }),
            });
            const result = await res.json();
            if (result.status) {
              alert("Success! Password reset.");
              window.location.href = "login.html";
            } else {
              alert(result.message);
              btn.innerText = "Reset Password";
              btn.disabled = false;
            }
          } catch (err) {
            console.error(err);
            alert("Server Error");
          }
      });
    </script>
  </body>
</html>
