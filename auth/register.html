<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Job Portal - Register</title>
    <link rel="stylesheet" href="../style.css" />
    <link rel="stylesheet" href="register.css" />
  </head>
  <body class="register-body">
    <div class="register-card">
      <div class="register-image-side">
        <img
          src="../assets/Public/Filing system.svg"
          alt="register-img"
          class="auth-illustration"
        />
      </div>

      <div class="register-form-side">
        <h2 class="auth-title">Create account.</h2>
        <p class="auth-subtitle">Select the user type!</p>

        <div id="select-user" class="user-toggle-group">
          <label class="toggle-option">
            <input
              type="radio"
              name="userType"
              value="jobseeker"
              checked
              class="sr-only"
            />
            <div class="toggle-button">Job Seeker</div>
          </label>
          <label class="toggle-option">
            <input
              type="radio"
              name="userType"
              value="employer"
              class="sr-only"
            />
            <div class="toggle-button">Employer</div>
          </label>
        </div>

        <form id="jobseeker-form" class="auth-form">
          <div class="input-row">
            <input
              id="first_name"
              type="text"
              placeholder="First Name"
              class="input-field"
            />
            <input
              id="last_name"
              type="text"
              placeholder="Last Name"
              class="input-field"
            />
          </div>

          <div class="input-row">
            <div class="input-container">
              <input
                id="email_id"
                type="email"
                placeholder="Email Id"
                class="input-field"
              />
              <p id="js-email-error" class="error-text"></p>
            </div>
            <input
              id="mobile_number"
              type="tel"
              placeholder="Mobile Number"
              class="input-field"
            />
          </div>

          <div class="password-wrapper">
            <input
              type="password"
              id="password"
              placeholder="Password"
              class="input-field pr-icon"
            />
            <span
              class="password-toggle"
              onclick="togglePassword('password', this)"
            >
              <img src="../assets/Icons/hide.png" alt="Show" />
            </span>
          </div>

          <div class="password-wrapper">
            <input
              type="password"
              id="confirm-password"
              placeholder="Confirm Password"
              class="input-field pr-icon"
            />
            <span
              class="password-toggle"
              onclick="togglePassword('confirm-password', this)"
            >
              <img src="../assets/Icons/hide.png" alt="Show" />
            </span>
          </div>

          <p id="js-general-error" class="error-text central"></p>

          <button id="registerBtn" type="submit" class="btn btn-primary w-full">
            Create Job Seeker Account
          </button>
        </form>

        <form id="employer-form" class="auth-form hidden">
          <p class="section-label">Select company size & industry</p>
          <div class="dropdown-stack">
            <div class="custom-select" data-name="companySize">
              <div class="selected-box">
                Company Size <span class="arrow">▼</span>
              </div>
              <div class="options-list">
                <div class="option-item">1-5 Employers</div>
                <div class="option-item">5-20 Employers</div>
                <div class="option-item">20-50 Employers</div>
                <div class="option-item">50-100 Employers</div>
                <div class="option-item">100+ Employers</div>
              </div>
            </div>

            <div class="custom-select" data-name="industry">
              <div class="selected-box">
                Industry Type <span class="arrow">▼</span>
              </div>
              <div class="options-list">
                <div class="option-item">Accounting</div>
                <div class="option-item">IT & Software</div>
                <div class="option-item">Marketing</div>
                <div class="option-item">Medical</div>
                <div class="option-item">Engineering</div>
              </div>
            </div>

            <input type="hidden" id="companySizeInput" />
            <input type="hidden" id="industryInput" />

            <button
              type="button"
              id="continueBtn"
              class="btn btn-primary w-full mt-4"
            >
              Continue
            </button>
          </div>
        </form>

        <form id="employer-detail-form" class="auth-form hidden">
          <div class="input-row">
            <input
              id="company_name"
              type="text"
              placeholder="Company Name"
              class="input-field"
            />
            <input
              id="company_location"
              type="text"
              placeholder="Location"
              class="input-field"
            />
          </div>

          <div class="input-row">
            <div class="input-container">
              <input
                id="company_email"
                type="text"
                placeholder="Email Id"
                class="input-field"
              />
              <p id="emp-email-error" class="error-text"></p>
            </div>
            <input
              id="company_mobile"
              type="tel"
              placeholder="Mobile Number"
              class="input-field"
            />
          </div>

          <div class="password-wrapper">
            <input
              type="password"
              id="company_password"
              placeholder="Password"
              class="input-field pr-icon"
            />
            <span
              class="password-toggle"
              onclick="togglePassword('company_password', this)"
            >
              <img src="../assets/Icons/hide.png" alt="Show" />
            </span>
          </div>

          <div class="password-wrapper">
            <input
              type="password"
              id="company_confirm_password"
              placeholder="Confirm Password"
              class="input-field pr-icon"
            />
            <span
              class="password-toggle"
              onclick="togglePassword('company_confirm_password', this)"
            >
              <img src="../assets/Icons/hide.png" alt="Show" />
            </span>
          </div>

          <p id="emp-general-error" class="error-text central"></p>

          <button
            id="employersRegisterBtn"
            type="submit"
            class="btn btn-primary w-full"
          >
            Create Account
          </button>
        </form>

        <div class="auth-footer">
          Already have an account?
          <a href="login.html" class="auth-link">Login</a>
        </div>
      </div>
    </div>

    <script src="js/register.js"></script>
  </body>
</html>
