<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Job Portal - Login</title>

    <link rel="stylesheet" href="../style.css" />

    <link rel="stylesheet" href="login.css" />
  </head>
  <body class="auth-page">
    <div class="auth-container">
      <div class="auth-left">
        <img
          src="../assets/Public/Filing system.svg"
          alt="login-illustration"
          class="auth-image"
        />
      </div>

      <div class="auth-right">
        <h2>Login to your account.</h2>

        <form id="login-form">
          <div class="form-group">
            <input
              id="email_id"
              type="email"
              placeholder="Email Id"
              required
              class="form-input"
            />
            <p id="emailError" class="error-text"></p>
          </div>

          <div class="form-group">
            <input
              type="password"
              id="password"
              placeholder="Password"
              required
              class="form-input pr-icon"
            />
            <span
              class="toggle-password"
              onclick="togglePassword('password', this)"
            >
              <img
                src="../assets/Icons/hide.png"
                class="password-icon"
                alt="Show/Hide"
              />
            </span>
          </div>

          <div class="form-actions">
            <a href="reset_password.html" class="forgot-link"
              >Forgot Password?</a
            >
          </div>

          <button id="loginBtn" type="submit" class="btn btn-primary btn-full">
            Log in
          </button>

          <div class="auth-footer">
            Don't have an account?
            <a href="register.html">Register</a>
          </div>
        </form>
      </div>
    </div>

    <script src="js/login.js"></script>
  </body>
</html>
